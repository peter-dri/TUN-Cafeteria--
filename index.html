<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUN Cafeteria</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-logo">
                <!--svg role="img" aria-label="Tharaka Cafeteria logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"-->
                    <title>Tharaka Cafeteria</title>
                    <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="32" cy="32" r="14" opacity="0.95"></circle>
                        <path d="M24 20v16" />
                        <path d="M28 20v12" />
                        <path d="M40 22c0 6-4 10-10 10" />
                    </g>
                </svg>
                <h1>🍽️ TUN Cafeteria</h1>
            </div>
            <div class="header-actions">
                <div class="controls-group">
                    <button id="themeToggle" class="theme-toggle" title="Toggle Dark Mode">🌙</button>
                    <button id="langToggle" class="language-toggle">EN</button>
                </div>
                <button id="cartBtn" class="btn btn-primary">
                    <span data-en="🛒 Cart" data-sw="🛒 Kikapu">🛒 Cart</span> (<span id="cartCount">0</span>)
                </button>
                <a href="admin.html" class="btn btn-secondary" data-en="Admin" data-sw="Msimamizi">Admin</a>
            </div>
        </div>
    </header>

    <!-- Welcome Banner -->
    <section class="welcome">
        <div class="container">
            <h2 data-en="Welcome to Tharaka University Cafeteria" data-sw="Karibu Mkahawa wa Chuo Kikuu cha Tharaka">Welcome to Tharaka University Cafeteria</h2>
            <p data-en="Fresh meals, great prices, quick service" data-sw="Chakula safi, bei nzuri, huduma ya haraka">Fresh meals, great prices, quick service</p>
        </div>
    </section>

    <!-- Menu -->
    <main class="container">
        <div id="orderingStatusBanner" class="ordering-status-banner is-hidden" role="status" aria-live="polite">
            PAST ORDERING TIME
        </div>

        <!-- Search & Filters removed for simplified Student UI -->
        <div style="margin: 1.5rem 0;"></div>

        <!-- Recommendations removed -->

        <!-- Preferences removed -->

        <section class="menu-section" id="breakfastSection">
            <h2 data-en="🌅 Breakfast" data-sw="🌅 Kifungua Kinywa">🌅 Breakfast</h2>
            <div id="breakfastMenu" class="menu-grid"></div>
        </section>

        <section class="menu-section" id="lunchSection">
            <h2 data-en="🍛 Lunch" data-sw="🍛 Chakula cha Mchana">🍛 Lunch</h2>
            <div id="lunchMenu" class="menu-grid"></div>
        </section>
    </main>

    <!-- Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Your Cart</h3>
                <button id="closeCartBtn" class="close">&times;</button>
            </div>
            <div id="cartItems" class="cart-items"></div>
            <div class="cart-footer">
                <div class="cart-total">
                    Total: <strong>KSh <span id="cartTotal">0</span></strong>
                </div>
                <button id="checkoutBtn" class="btn btn-primary btn-block">Proceed to Payment</button>
            </div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Payment Options</h3>
                <button id="closePaymentBtn" class="close">&times;</button>
            </div>
            <div class="cart-items">
                <div id="paymentSummary" style="margin-bottom: 1rem; padding: 1rem; background: #F7FAFC; border-radius: 0.375rem;"></div>
                <div class="cart-total" style="margin-bottom: 1.5rem;">
                    Total: <strong>KSh <span id="paymentTotal">0</span></strong>
                </div>

                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Enter Your Name</label>
                    <input type="text" id="customerName" placeholder="e.g. John Doe" class="form-control" style="width: 100%; padding: 0.75rem; border: 1px solid #CBD5E0; border-radius: 0.375rem; font-size: 1rem;">
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label>M-Pesa Phone Number</label>
                    <input type="tel" id="mpesaPhone" placeholder="0712345678" class="form-control" style="width: 100%; padding: 0.75rem; border: 1px solid #CBD5E0; border-radius: 0.375rem; font-size: 1rem;">
                    <p style="font-size: 0.875rem; color: #718096; margin-top: 0.5rem;">Payment method: M-Pesa only</p>
                </div>
            </div>
            <div class="cart-footer">
                <button id="confirmPaymentBtn" class="btn btn-primary btn-block">Confirm Order</button>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <div class="loading-text">Loading menu...</div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="success-modal">
        <div class="success-content">
            <div class="success-checkmark"></div>
            <!-- Title removed -->
            <p id="successMessage"></p>
        </div>
    </div>

    <!-- Toast Container for Notifications -->
    <div id="toastContainer" style="position: fixed; bottom: 1rem; right: 1rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.5rem;"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content" style="display:flex; justify-content:center; align-items:center;">
                <p style="margin:0; text-align:center;">Education for Freedom</p>
            </div>
        </div>
    </footer>

    <!-- Preferences removed -->

    <!-- Scripts -->
    <script src="modules/userProfile.js"></script>
    <script src="modules/orderingHours.js"></script>
    <script src="modules/menu.js"></script>
    <script src="modules/cart.js"></script>
    <script src="modules/payment.js"></script>
    <script>
        // Show notification toast
        function showNotification(message) {
            const toastContainer = document.getElementById('toastContainer');
            if (!toastContainer) return;
            
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.cssText = 'background: #48BB78; color: white; padding: 1rem; border-radius: 0.5rem; margin-bottom: 0.5rem; animation: slideIn 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.1);';
            toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Initialize app
        let appData = { menu: {}, orders: [] };
        let dataRequestInFlight = null;
        let lastDataSignature = '';
        let autoRefreshIntervalId = null;

        // Show/Hide loading
        function showLoading(message = 'Loading...') {
            const overlay = document.getElementById('loadingOverlay');
            const text = overlay.querySelector('.loading-text');
            text.textContent = message;
            overlay.style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loadingOverlay').style.display = 'none';
        }

        // Show success animation
        function showSuccess(message) {
            const modal = document.getElementById('successModal');
            document.getElementById('successMessage').textContent = message;
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.style.display = 'none';
            }, 3000);
        }

        // Load data from server
        async function loadData(options = {}) {
            const { showSpinner = true, forceRender = false } = options;

            if (dataRequestInFlight) {
                return dataRequestInFlight;
            }

            dataRequestInFlight = (async () => {
                try {
                    if (showSpinner) {
                        showLoading('Loading fresh menu...');
                    }

                    const response = await fetch('/api/menu-state', {
                        cache: 'no-store'
                    });

                    if (!response.ok) {
                        throw new Error(`Failed to fetch data: ${response.status}`);
                    }

                    const nextData = await response.json();
                    const nextSignature = JSON.stringify({
                        foodData: nextData.foodData,
                        orderCounter: nextData.orderCounter,
                        orderCount: Array.isArray(nextData.orderHistory) ? nextData.orderHistory.length : 0
                    });

                    appData = nextData;

                    if (forceRender || nextSignature !== lastDataSignature) {
                        MenuModule.render(appData.foodData);
                        if (window.OrderingHoursModule && typeof OrderingHoursModule.refresh === 'function') {
                            OrderingHoursModule.refresh();
                        }
                        lastDataSignature = nextSignature;
                    }

                    // Recommendations removed: no-op
                } catch (error) {
                    console.error('Error loading data:', error);
                    if (showSpinner) {
                        alert('Failed to load menu. Please refresh the page.');
                    }
                } finally {
                    if (showSpinner) {
                        hideLoading();
                    }
                    dataRequestInFlight = null;
                }
            })();

            return dataRequestInFlight;
        }

        // Auto-refresh menu every 30 seconds to show updated inventory
        function startAutoRefresh() {
            if (autoRefreshIntervalId) {
                clearInterval(autoRefreshIntervalId);
            }

            autoRefreshIntervalId = setInterval(() => {
                if (!document.hidden) {
                    loadData({ showSpinner: false });
                }
            }, 45000); // Refresh every 45 seconds when tab is active

            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    loadData({ showSpinner: false });
                }
            });
        }

        // Helper functions
        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }

        function closePayment() {
            document.getElementById('paymentModal').style.display = 'none';
        }

        // Search & filter functionality removed for simplified Student UI

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (window.OrderingHoursModule && typeof OrderingHoursModule.init === 'function') {
                OrderingHoursModule.init();
            }
            loadData({ showSpinner: true, forceRender: true });
            CartModule.init();
            startAutoRefresh();


            // Cart button
            document.getElementById('cartBtn').addEventListener('click', () => {
                CartModule.show();
            });

            // Close cart button
            document.getElementById('closeCartBtn').addEventListener('click', closeCart);

            // Close payment button
            document.getElementById('closePaymentBtn').addEventListener('click', closePayment);

            // Preferences removed

            // Filter controls removed

            // Checkout - Show payment modal
            document.getElementById('checkoutBtn').addEventListener('click', () => {
                console.log('Checkout button clicked');
                const cart = CartModule.getItems();
                console.log('Cart items:', cart);
                if (cart.length === 0) {
                    alert('Your cart is empty!');
                    return;
                }

                console.log('Showing payment modal with total:', CartModule.getTotal());
                PaymentModule.showPaymentModal(cart, CartModule.getTotal());
                closeCart();
            });

            // Confirm payment and place order
            document.getElementById('confirmPaymentBtn').addEventListener('click', async () => {
                const cart = CartModule.getItems();
                const total = CartModule.getTotal();
                const customerName = document.getElementById('customerName').value.trim();
                const mpesaPhone = document.getElementById('mpesaPhone').value.trim();

                if (!customerName) {
                    alert('Please enter your name');
                    return;
                }

                if (!mpesaPhone) {
                    alert('Please enter your M-Pesa phone number');
                    return;
                }

                try {
                    showLoading('Processing your order...');
                    const result = await PaymentModule.processPayment('mpesa', cart, total, mpesaPhone, customerName);
                    hideLoading();
                    
                    if (result.success) {
                        showSuccess(`Order #${result.order.orderNumber} placed successfully! Total: KSh ${result.order.total}`);
                        CartModule.clear();
                        closePayment();
                        setTimeout(() => loadData(), 1000);
                    } else {
                        if (result.error === 'Insufficient inventory') {
                            alert(`❌ Order Failed - Insufficient Inventory\n\n${result.details}\n\nPlease refresh the menu and adjust your order.`);
                            loadData();
                        } else {
                            alert('Error placing order: ' + (result.error || 'Unknown error'));
                        }
                    }
                } catch (error) {
                    hideLoading();
                    alert('Error placing order: ' + error.message);
                }
            });

            // Theme Toggle
            const themeToggle = document.getElementById('themeToggle');
            const currentTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            themeToggle.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

            themeToggle.addEventListener('click', () => {
                const theme = document.documentElement.getAttribute('data-theme');
                const newTheme = theme === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            });

            // Language Toggle
            const langToggle = document.getElementById('langToggle');
            let currentLang = localStorage.getItem('language') || 'en';
            
            function switchLanguage(lang) {
                currentLang = lang;
                localStorage.setItem('language', lang);
                langToggle.textContent = lang === 'en' ? 'EN' : 'SW';
                
                document.querySelectorAll('[data-en][data-sw]').forEach(el => {
                    const text = el.getAttribute('data-' + lang);
                    if (text) {
                        if (el.tagName === 'INPUT' || el.tagName === 'BUTTON') {
                            if (el.hasAttribute('placeholder')) {
                                el.placeholder = text;
                            } else {
                                el.innerHTML = text;
                            }
                        } else {
                            el.textContent = text;
                        }
                    }
                });
            }

            langToggle.addEventListener('click', () => {
                switchLanguage(currentLang === 'en' ? 'sw' : 'en');
            });

            switchLanguage(currentLang);

            // Keyboard Shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                if (e.key.toLowerCase() === 'c') {
                    CartModule.show();
                } else if (e.key.toLowerCase() === 'r') {
                    loadData();
                } else if (e.key === 'Escape') {
                    closeCart();
                    closePayment();
                } else if (e.key.toLowerCase() === 'd') {
                    themeToggle.click();
                } else if (e.key.toLowerCase() === 'l') {
                    langToggle.click();
                }
            });
        });    </script>
</body>
</html>
